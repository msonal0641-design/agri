
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriDiagnost – Crop Disease Assessment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1F3D2B',
                        secondary: '#556B2F',
                        warmSand: '#E8E2D6',
                        offWhite: '#F5F4F1',
                        charcoal: '#1C1C1C',
                        mutedGray: '#6A6A6A',
                        severe: '#6E1E1E',
                        moderate: '#B08900',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    borderRadius: {
                        'subtle': '6px',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #E8E2D6;
            color: #1C1C1C;
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
        }
        .printable {
            background: white;
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: auto;
            border: 1px solid #ddd;
        }
        @media print {
            body * {
                visibility: hidden;
            }
            .printable, .printable * {
                visibility: visible;
            }
            .printable {
                position: absolute;
                left: 0;
                top: 0;
                border: none;
            }
            .no-print {
                display: none;
            }
        }
    </style>
